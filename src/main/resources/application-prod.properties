spring.application.name=aquatrack


# ===== BANCO PROD =====
spring.datasource.url=jdbc:postgresql://localhost:5432/aquatrack
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA ===
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# === Domínio do sistema ===
aquatrack.domain=https://aquatrackpb.site

# ===== EMAIL PROD (Gmail) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${AQUATRACK_MAIL_USERNAME}
spring.mail.password=${AQUATRACK_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

server.forward-headers-strategy=framework