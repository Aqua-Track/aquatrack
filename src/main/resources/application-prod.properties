spring.application.name=aquatrack


# ===== BANCO PROD =====
spring.datasource.url=jdbc:postgresql://localhost:5432/aquatrack
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== EMAIL PROD (Gmail) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${AQUATRACK_MAIL_USERNAME}
spring.mail.password=${AQUATRACK_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

#Domínio aquatrack (usado no link que vai no email)
#quando mandar pra produçăo alterar para https://aquatrackpb.shop
aquaTrack.domain=http://localhost:8080