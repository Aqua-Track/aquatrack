<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Abastecer Ração</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body class="bg-light">
<section class="d-flex justify-content-center mt-5 mb-5">
    <div class="card shadow-sm p-4 col-12 col-md-10 col-lg-8">
        <h2 class="mb-3">Abastecer estoque de ração da fazenda</h2>

        <!-- Alerta de erro -->
        <div th:if="${erro}" class="alert alert-danger" role="alert">
            <p th:text="${erro}"></p>
        </div>

        <!-- Formulário -->
        <form th:action="@{/fazenda/{id}/abastecer-racao(id=${idFazenda})}" method="post">
            <div class="row">
                <!-- Coluna esquerda -->
                <div class="col-md-6">

                    <!-- Seleção dinâmica de Tipo de Ração -->
                    <div class="mb-3">
                        <label for="tipoRacaoId" class="form-label">Tipo de ração</label>
                        <select class="form-select"
                                id="tipoRacaoId"
                                name="tipoRacaoId"
                                required>
                            <option value="" disabled selected>
                                Selecione o tipo de ração
                            </option>
                            <option th:each="racao : ${tiposRacao}"
                                    th:value="${racao.id}"
                                    th:text="${racao.nome}">
                            </option>
                        </select>
                    </div>

                    <!-- Quantidade em SACOS -->
                    <div class="mb-3">
                        <label for="quantidadeSacos" class="form-label">
                            Quantidade <span class="text-muted">(Sacos)</span>
                        </label>
                        <input type="number"
                               class="form-control"
                               id="quantidadeSacos"
                               name="quantidadeSacos"
                               min="1"
                               required>
                    </div>
                </div>

                <!-- Coluna direita: explicação -->
                <div class="col-md-6 mt-2">
                    <div class="alert alert-info text-center">
                        <div class="mb-2">
                            <strong class="text-center">Observação</strong><br>
                        </div>
                        <p>A quantidade informada corresponde ao número de
                        <strong>sacos de ração</strong> adicionados ao estoque.&nbsp;
                        O peso total em Kg será calculado automaticamente
                            com base no peso do saco cadastrado.</p>
                    </div>
                </div>
            </div>

            <!-- Botões -->
            <div class="d-flex justify-content-end gap-2">
                <a th:href="@{/fazenda/{id}(id=${idFazenda})}"
                   class="btn btn-danger">
                    Cancelar
                </a>
                <button type="submit" class="btn btn-success">
                    Salvar
                </button>
            </div>
        </form>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
