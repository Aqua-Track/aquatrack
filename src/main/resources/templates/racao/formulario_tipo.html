<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Cadastrar Tipo de Ração</title>
</head>
<body class="bg-light">
<section class="d-flex justify-content-center mt-5">

    <div class="card shadow-sm p-4 col-12 col-md-6">
        <div class="text-center">
            <h2 class="mb-0">Cadastrar novo tipo de ração</h2>
            <p class="mb-4">Adicione um novo tipo de ração que pode ser adicionado ao estoque da fazenda</p>
        </div>

        <div th:if="${erro}" class="alert alert-danger">
            <p th:text="${erro}"></p>
        </div>

        <form th:action="@{/racoes/criar}" method="post">

            <div class="mb-3">
                <label class="form-label">Nome</label>
                <input type="text" name="nome" class="form-control" required minlength="3">
            </div>

            <div class="mb-3">
                <label class="form-label">Fabricante</label>
                <input type="text" name="fabricante" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Quantidade por saco <span class="text-muted">(Kg)</span></label>
                <input type="number" name="kgPorSaco" class="form-control" min="0.1" step="0.1" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Valor por saco <span class="text-muted">(R$)</span></label>
                <input type="number" name="valorPorSaco" class="form-control" min="0.01" step="0.01" required>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a th:href="@{/racoes}" class="btn btn-danger">
                    Cancelar
                </a>
                <button type="submit" class="btn btn-success">
                    Salvar
                </button>
            </div>
        </form>
    </div>

</section>
</body>
</html>
