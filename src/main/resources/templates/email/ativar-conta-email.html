<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ativação de Conta - AquaTrack</title>

    <style>
        /* Mobile */
        @media only screen and (max-width: 600px) {
            .container {
                width: 90% !important;
            }

            .content {
                padding: 20px !important;
            }

            .title {
                font-size: 20px !important;
            }

            .text {
                font-size: 14px !important;
            }

            .button {
                width: 100% !important;
                box-sizing: border-box;
            }
        }
    </style>
</head>

<body style="margin:0; padding:0; background-color:#f2f4f7; font-family:Arial, Helvetica, sans-serif;">

<!-- Fundo azul -->
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0d47a1; padding:20px 0;">
    <tr>
        <td align="center">

            <!-- Container -->
            <table class="container"
                   width="100%"
                   cellpadding="0"
                   cellspacing="0"
                   style="max-width:600px; background:#ffffff; border-radius:10px; overflow:hidden;">

                <!-- Header -->
                <tr>
                    <td align="center" style=" padding: 20px 20px 10px 20px; background-color: #ffffff;">
                        <img src="cid:logo"
                             alt="AquaTrack"
                             width="260"
                             style=" display: block; max-width: 260px; width: 100%; height: auto;">
                    </td>
                </tr>

                <tr>
                    <td style="padding:0 30px;">
                        <hr style="border:none; border-top:1px solid #eeeeee;">
                    </td>
                </tr>

                <!-- Conteúdo -->
                <tr>
                    <td class="content" style=" padding: 20px 30px 30px 30px; color: #333333; text-align: center;">

                        <h2 class="title" style="color:#0d47a1; margin: 10px 0 15px 0;">
                            Ativação de Conta
                        </h2>

                        <p class="text" style="font-size:15px; line-height:1.6;">
                            Você está a um passo de começar a usar o
                            <strong>AquaTrack</strong>,
                            o gerenciador inteligente de fazendas de camarão.
                        </p>

                        <p class="text" style="font-size:15px;">
                            Clique no botão abaixo para ativar sua conta:
                        </p>

                        <!-- Botão -->
                        <a th:href="${linkAtivacao}"
                           class="button"
                           style="
                 display:inline-block;
                 margin-top:20px;
                 background-color:#ff6f00;
                 color:#ffffff;
                 padding:14px 24px;
                 text-decoration:none;
                 font-weight:bold;
                 border-radius:6px;
                 font-size:15px;
               ">
                            Ativar conta
                        </a>

                        <p style="margin-top:25px; font-size:12px; color:#666666;">
                            Se você não solicitou a criação dessa conta,
                            pode ignorar este e-mail.
                        </p>

                    </td>
                </tr>


            </table>
</table>
    <!-- Rodapé -->
    <div class="mb-3" align="center" style="background:#0d47a1; padding:15px;">
        <p style="color:#ffffff; font-size:12px; margin:0;">
            © 2025 AquaTrack
        </p>
    </div>
</body>
</html>
