<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout-publico :: layout(~{::title}, ~{::section})}">
<head>
    <title>Página não encontrada | AquaTrack</title>
</head>
<body>

<section class="d-flex justify-content-center align-items-center"
         style="min-height: calc(85vh - 120px);">

    <div class="text-center bg-white p-5 rounded shadow"
         style="max-width: 520px; width: 100%;">

        <img src="/images/logo-texto-sem-slogan.png"
             alt="AquaTrack"
             style="max-width: 230px;"
             class="mb-4">

        <h2 class="fw-bold text-primary mb-3">
            Página não encontrada
        </h2>

        <p class="text-muted mb-4" style="font-size: 1.05rem;">
            A página que você tentou acessar não existe ou foi movida.
            <br>
            Você pode voltar e continuar sua navegação normalmente.
        </p>

        <div class="d-flex justify-content-center gap-3 flex-wrap">
            <button class="btn btn-outline-danger"
                    onclick="history.back()">
                Voltar
            </button>
        </div>

    </div>

</section>

</body>
</html>
