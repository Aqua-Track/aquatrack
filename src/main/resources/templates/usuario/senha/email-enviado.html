<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout-publico :: layout(~{::title}, ~{::section})}">
<head>
    <title>Email enviado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-8 col-xl-5">
            <div class="card shadow-sm rounded-3">
                <div class="card-body p-4 text-center">

                    <h2 class="mb-3">
                        Verifique seu e-mail
                    </h2>

                    <p class="mb-4">
                        Você recebeu um link para redefinir sua senha.
                    </p>

                    <p class="text-muted mb-4" style="font-size: 14px;">
                        Caso não encontre o e-mail, verifique sua caixa de spam.
                    </p>

                    <a href="/login" class="btn btn-success px-4">
                        Voltar para o login
                    </a>

                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
