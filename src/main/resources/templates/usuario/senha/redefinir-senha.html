<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Recuperar senha</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-8 col-xl-5">
            <div class="card shadow-sm rounded-3">
                <div class="card-body p-4">

                    <h2 class="text-center mb-1">
                        Recuperar senha
                    </h2>

                    <p class="text-center mt-2 mb-4">
                        Informe o e-mail cadastrado no seu perfil.<br>
                        Enviaremos um link para redefinir a sua senha.
                    </p>

                    <!-- alertas -->
                    <div th:if="${info}" class="alert alert-success mb-3" th:text="${info}"></div>
                    <div th:if="${erro}" class="alert alert-danger mb-3" th:text="${erro}"></div>

                    <form action="/redefinir-senha" method="post">
                        <div class="mb-3">
                            <label for="login" class="form-label fw-semibold">E-mail:</label>
                            <input type="email"
                                   class="form-control"
                                   id="login"
                                   name="login"
                                   required
                                   placeholder="seu@email.com">
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="/login" class="btn btn-danger px-4">Voltar</a>
                            <button type="submit" class="btn btn-success px-4">Enviar</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
