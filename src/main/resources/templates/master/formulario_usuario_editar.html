<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Cadastrar-se</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body class="bg-light">
<section class="container my-5">
    <h2 class="mb-4">Editar Usuário</h2>

    <!-- Alerta de erro -->
    <div th:if="${erro}" class="alert alert-danger" role="alert">
        <p th:text="${erro}"></p>
    </div>

    <form th:action="@{/master/editar}" method="post">
        <input type="hidden" name="id" th:value="${usuario.id}" />

        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" name="nome" class="form-control"
                   th:value="${usuario.nome}" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="login" class="form-control"
                   th:value="${usuario.login}" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Nova senha</label>
            <input type="password" name="senha" class="form-control"
                   placeholder="Deixe em branco para não alterar" />
        </div>

        <div class="d-flex justify-content-end gap-2">
            <a href="/master" class="btn btn-danger">Cancelar</a>
            <button type="submit" class="btn btn-primary">Salvar</button>
        </div>

        <hr>

        <div class="mb-3">
            <label class="form-label text-danger">
                Confirme sua senha (Master)
            </label>
            <input type="password"
                   name="senhaMaster"
                   class="form-control"
                   placeholder="Digite sua senha para confirmar a edição"
                   required />
        </div>

    </form>
</section>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
