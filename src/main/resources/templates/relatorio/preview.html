<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Relatório Final</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: #333;
        }

        h1, h2 {
            text-align: center;
        }

        .bloco {
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #999;
            padding: 6px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        .info {
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

<h1>Relatório Final do Ciclo</h1>

<div class="info">
    <strong>Fazenda:</strong> <span th:text="${relatorio.nomeFazenda}"></span><br>
    <strong>Viveiro:</strong> <span th:text="${relatorio.tagViveiro}"></span>
</div>

<div class="bloco">
    <h2>Período</h2>
    <table>
        <tr>
            <th>Data Povoamento</th>
            <th>Data Encerramento</th>
            <th>Dias de Cultivo</th>
        </tr>
        <tr>
            <td th:text="${relatorio.dataPovoamento}"></td>
            <td th:text="${relatorio.dataEncerramento}"></td>
            <td th:text="${relatorio.diasCultivo}"></td>
        </tr>
    </table>
</div>

<div class="bloco">
    <h2>Produção</h2>
    <table>
        <tr>
            <th>Qtd. Povoada</th>
            <th>Biometria Final (g)</th>
            <th>Biomassa Final (kg)</th>
        </tr>
        <tr>
            <td th:text="${relatorio.quantidadePovoada}"></td>
            <td th:text="${relatorio.biometriaFinal}"></td>
            <td th:text="${relatorio.biomassaFinal}"></td>
        </tr>
    </table>
</div>

<div class="bloco">
    <h2>Indicadores</h2>
    <table>
        <tr>
            <th>Consumo Total (kg)</th>
            <th>Sobrevivência (%)</th>
            <th>FCA</th>
        </tr>
        <tr>
            <td th:text="${relatorio.consumoTotalRacao}"></td>
            <td th:text="${relatorio.sobrevivencia}"></td>
            <td th:text="${relatorio.fca}"></td>
        </tr>
    </table>
</div>

</body>
</html>
