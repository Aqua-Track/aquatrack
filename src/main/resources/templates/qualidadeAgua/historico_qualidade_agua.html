<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Histórico de Qualidade da Água</title>
</head>

<body>
<section class="container mt-5">

    <!-- Cabeçalho -->
    <div class="row my-5">
        <div class="col text-center">
            <h2>Histórico de Qualidade da Água</h2>
            <p class="text-muted">
                Selecione uma data para visualizar os parâmetros analisados
            </p>
        </div>
    </div>

    <!-- Nav bar -->
    <div th:replace="~{fragments/navbar_viveiro :: navbarViveiro( ${codigo}, ${viveiroId}, ${ciclo},${abaAtiva})}"></div>

    <!-- Tabela de datas -->
    <div class="card shadow-sm p-4">
        <table class="table table-bordered table-striped text-center">
            <thead>
            <tr>
                <th>Data</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="q, iter : ${historicoQualidade}">
                <td th:text="${#temporals.format(q.dataColeta, 'dd/MM/yyyy')}"></td>
                <td class="d-flex justify-content-center gap-2">
                    <!-- VER DETALHES -->
                    <button class="btn btn-sm btn-info text-white"
                            data-bs-toggle="modal"
                            th:attr="data-bs-target='#modalQualidade' + ${iter.index}">
                        Ver Detalhes
                    </button>

                    <!-- EDITAR -->
                    <a class="btn btn-primary btn-sm"
                       th:href="@{/fazenda/{codigo}/viveiro/{viveiroId}/qualidade-agua/{id}/editar(
            codigo=${codigo}, viveiroId=${viveiroId},id=${q.id})}">
                        Editar
                    </a>

                    <!-- APAGAR -->
                    <form th:action="@{/fazenda/{codigo}/viveiro/{viveiroId}/qualidade-agua/{id}/excluir(
            codigo=${codigo},viveiroId=${viveiroId},id=${q.id})}"
                          method="post"
                          onsubmit="return confirm('Deseja realmente apagar esta análise?');">
                        <button type="submit" class="btn btn-sm btn-danger">
                            Apagar
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(historicoQualidade)}">
                <td colspan="2">Nenhuma análise registrada</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Modais -->
    <div th:each="q, iter : ${historicoQualidade}">
        <div class="modal fade"
             th:id="'modalQualidade' + ${iter.index}"
             tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-info text-white">
                        <h5 class="modal-title">
                            Qualidade da Água –
                            <span th:text="${#temporals.format(q.dataColeta, 'dd/MM/yyyy')}"></span>
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>
                            <strong>Amônia:</strong>
                            <span th:text="${q.amonia != null ? q.amonia : 'Não coletado'}"></span>
                        </p>
                        <p>
                            <strong>Nitrito:</strong>
                            <span th:text="${q.nitrito != null ? q.nitrito : 'Não coletado'}"></span>
                        </p>
                        <p>
                            <strong>pH:</strong>
                            <span th:text="${q.ph != null ? q.ph : 'Não coletado'}"></span>
                        </p>
                        <p>
                            <strong>Alcalinidade:</strong>
                            <span th:text="${q.alcalinidade != null ? q.alcalinidade : 'Não coletado'}"></span>
                        </p>
                        <p>
                            <strong>Salinidade:</strong>
                            <span th:text="${q.salinidade != null ? q.salinidade : 'Não coletado'}"></span>
                        </p>
                        <p>
                            <strong>Oxigênio:</strong>
                            <span th:text="${q.oxigenio != null ? q.oxigenio : 'Não coletado'}"></span>
                        </p>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary"
                                data-bs-dismiss="modal">
                            Fechar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</section>
</body>
</html>
