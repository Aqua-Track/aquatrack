<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Nova Análise de Qualidade da Água</title>
</head>

<body>
<section class="container mt-5 mb-5">

    <div class="row mb-4">
        <div class="col text-center">
            <h2>Nova Análise de Qualidade da Água</h2>
            <p class="text-muted">
                Preencha apenas os parâmetros que foram analisados hoje.
            </p>
        </div>
    </div>

    <div class="card shadow-sm p-4 col-md-8 mx-auto">

        <div th:if="${erro}" class="alert alert-danger">
            <span th:text="${erro}"></span>
        </div>

        <form th:action="@{/fazenda/{codigo}/viveiro/{id}/qualidade-agua(codigo=${codigo}, id=${viveiroId})}"
              method="post">

            <div class="mb-4">
                <label class="form-label">Data da Coleta</label>
                <input type="date"
                       name="dataColeta"
                       class="form-control"
                       required>
            </div>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Amônia (mg/L)</label>
                    <input type="number" step="0.01" min="0"
                           name="amonia"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Nitrito (mg/L)</label>
                    <input type="number" step="0.01" min="0"
                           name="nitrito"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">pH</label>
                    <input type="number" step="0.01" min="0" max="14"
                           name="ph"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Alcalinidade (mg/L)</label>
                    <input type="number" step="0.1" min="0"
                           name="alcalinidade"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Salinidade (mg/L)</label>
                    <input type="number" step="0.01" min="0"
                           name="salinidade"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Oxigênio (mg/L)</label>
                    <input type="number" step="0.01" min="0"
                           name="oxigenio"
                           class="form-control">
                </div>

            </div>

            <div class="d-flex justify-content-end gap-2 mt-3">
                <a th:href="@{/fazenda/{codigo}/viveiro/{id}/abrirViveiro(codigo=${codigo}, id=${viveiroId})}"
                   class="btn btn-danger">
                    Cancelar
                </a>
                <button class="btn btn-success">
                    Salvar
                </button>
            </div>

        </form>
    </div>

</section>
</body>
</html>
