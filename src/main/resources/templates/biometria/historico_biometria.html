<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Histórico de Biometrias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<section class="container mt-5">

    <!-- Cabeçalho -->
    <div class="row my-5">
        <div class="col">
            <h1 class="text-center mb-0">Histórico Biometria</h1>
            <p class="text-center mt-0">Aqui você pode gerenciar todas as análises de biometria.</p>
        </div>
    </div>

    <div class="card shadow-sm p-4">
        <h2 class="mb-3">Histórico de Biometria</h2>

        <!-- Tabela do Histórico -->
        <div class="mt-4">
            <h4>Tabela de Biometrias</h4>
            <table class="table table-bordered text-center">
                <thead>
                <tr>
                    <th>Data</th>
                    <th>Peso Médio (g)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${biometrias}">
                    <td th:text="${#temporals.format(b.dataBiometria, 'dd/MM/yyyy')}"></td>
                    <td th:text="${b.pesoMedio}"></td>
                </tr>
                <tr th:if="${biometrias.isEmpty()}">
                    <td colspan="2">Nenhuma biometria registrada</td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</section>

</body>
</html>
