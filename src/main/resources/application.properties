spring.application.name=aquatrack

# JPA (comum)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
#quando for deixar rodando com tudo ok trocar para validate
#o auto gera o banco de dados automaticamente, no validate ele so valida, se nn tiver ok, nÃ£o roda! nÃ³s que temos que criar com script sql
#validate e  o mais certo e mais seguro para Producao
spring.jpa.hibernate.ddl-auto=update

# Flyway (comum)
#Ativa o flyway pra configurar os arquivos de migrations
#migrations sao tipo tipo scripts que funcionam como um historico de comandos que rodam no bd
#os que ja existem nao podem ser alterados
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
