spring.application.name=aquatrack

# JPA (comum)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
#quando for deixar rodando com tudo ok trocar para validate**!!!
#o auto gera o banco de dados automaticamente, no validate ele só valida, se nn tiver ok, não roda! nós que temos que criar com script sql
#validate é o mais certo e mais seguro para Produção
spring.jpa.hibernate.ddl-auto=update

# Flyway (comum)
#Ativa o flyway pra configurar os arquivos de migrations
#migrations são tipo tipo scripts que funcionam como um histórico de comandos que rodam no bd
#os que já existem não podem ser alterados!
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true